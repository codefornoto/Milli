    <style>
        :root {
            --tifo-bg: #F7FAFC;
            --tifo-text: #2D3748;
            --tifo-primary: #4FD1C5;
            --tifo-primary-dark: #38B2AC;
            --tifo-secondary: #ED8936;
            --tifo-card-border: #E2E8F0;
            --tifo-card-bg: #FFFFFF;
        }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--tifo-bg);
            color: var(--tifo-text);
        }
        .tifo-card {
            background-color: var(--tifo-card-bg);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--tifo-card-border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .rank-badge {
            width: 2rem; height: 2rem; border-radius: 50%; display: inline-flex;
            align-items: center; justify-content: center; font-weight: bold; color: white;
            flex-shrink: 0;
        }
        .rank-1 { background-color: #4FD1C5; } /* TIFOカラー */
        .rank-2 { background-color: #CBD5E0; }
        .rank-3 { background-color: #A0AEC0; }
        .rank-default { background-color: #E2E8F0; color: #4A5568; }
        
        .feedback-tab-button {
            padding: 0.75rem 1.25rem;
            border-bottom: 3px solid transparent;
            font-weight: 600;
            color: #A0AEC0;
            transition: all 0.2s ease;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }
        .feedback-tab-button:hover {
            background-color: #F7FAFC;
            color: #4A5568;
        }
        .feedback-tab-button.active {
            color: var(--tifo-primary-dark);
            border-bottom-color: var(--tifo-primary);
        }

        /* 横スクロールバーのカスタマイズ */
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #F1F5F9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #CBD5E0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #A0AEC0; }

        /* アンケート用スタイル */
        @keyframes dotBounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
        }
        .dot-typing {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            align-items: center;
        }
        .dot-typing span {
            width: 0.75rem;
            height: 0.75rem;
            background-color: var(--tifo-primary);
            border-radius: 50%;
            animation: dotBounce 1.4s infinite ease-in-out both;
        }
        .dot-typing span:nth-child(1) { animation-delay: -0.32s; }
        .dot-typing span:nth-child(2) { animation-delay: -0.16s; }

        .nps-bar-container { position: relative; background: linear-gradient(to right, #FEB2B2, #EDF2F7, #9AE6B4); height: 0.75rem; border-radius: 9999px; }
        .nps-bar-marker { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 2px; height: 1.25rem; background-color: rgba(113, 128, 150, 0.5); border-radius: 1px; }
        .nps-bar-value { position: absolute; top: 50%; transform: translateY(-50%); width: 0.75rem; height: 0.75rem; background-color: var(--tifo-text); border-radius: 50%; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.3); transition: left 0.5s ease-in-out; }

        .feedback-content {
            height: 30rem;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // --- JNTO データとロジック ---

        const fallbackData = [
            {
                "report": { "source_name_ja": "日本政府観光局（JNTO）", "report_title_ja": "訪日外客数（2026年4月推計値）", "data_year": 2026, "data_month_number": 4 },
                "overall": {
                    "visitor_arrivals": { "month": { "current_value": 3692200, "change_pct_vs_comparison_year": -5.5 } },
                    "headline_summary_ja": "2026年4月の訪日外国人観光客数は3,692,200人で、前年同月比5.5%減となったものの、2026年の単月としては最高を記録し、2年連続で4月までの累計が1,400万人を超えた。",
                    "overall_context_ja": [
                        "イースター休暇の期ずれにより、欧州を中心に訪日需要が3月下旬と4月上旬に分散した。",
                        "桜シーズンに合わせた訪日需要の高まりもあり、東アジアでは韓国、東南アジアではベトナム、欧米豪では米国などで外国人観光客数が増加した。"
                    ]
                },
                "markets": [
                    { "market_key": "KR", "name_ja": "韓国", "region_ja": "東アジア", "visitor_arrivals": { "month": { "current_value": 878600, "change_pct_vs_comparison_year": 21.7 } }, "record": { "month_record": true, "record_note_ja": "4月として過去最高" }, "market_context": { "status_summary_ja": "継続する訪日旅行人気に加え、釜山～下地島間の新規就航や増便の影響等もあり、過去最高を記録した。", "positive_drivers_ja": [ "継続する訪日旅行人気" ], "constraints_ja": [], "aviation_updates_ja": [ "釜山～下地島間の新規就航", "仁川～成田間などの増便" ], "demand_events_ja": [] }, "dashboard_tags": [ "strong_growth", "record_high" ] },
                    { "market_key": "CN", "name_ja": "中国", "region_ja": "東アジア", "visitor_arrivals": { "month": { "current_value": 330700, "change_pct_vs_comparison_year": -56.8 } }, "record": {}, "market_context": { "status_summary_ja": "訪日需要が落ち着く時期であることに加え、中国政府より日本への渡航を避けるよう注意喚起があり、航空便の減便の影響等もあった。", "positive_drivers_ja": [], "constraints_ja": [ "中国政府より日本への渡航を避けるよう注意喚起" ], "aviation_updates_ja": [ "航空便の減便" ], "demand_events_ja": [] }, "dashboard_tags": [ "severe_decline" ] },
                    { "market_key": "TW", "name_ja": "台湾", "region_ja": "東アジア", "visitor_arrivals": { "month": { "current_value": 643500, "change_pct_vs_comparison_year": 19.7 } }, "record": { "month_record": true, "record_note_ja": "4月として過去最高" }, "market_context": { "status_summary_ja": "継続する訪日旅行人気に加え、チャーター便運航や4連休の影響等もあり、過去最高を記録した。", "positive_drivers_ja": [ "継続する訪日旅行人気" ], "constraints_ja": [], "aviation_updates_ja": [ "チャーター便の運航", "増便" ], "demand_events_ja": [ "4連休" ] }, "dashboard_tags": [ "moderate_growth" ] },
                    { "market_key": "US", "name_ja": "米国", "region_ja": "北米", "visitor_arrivals": { "month": { "current_value": 330000, "change_pct_vs_comparison_year": 0.8 } }, "record": { "month_record": true, "record_note_ja": "4月として過去最高" }, "market_context": { "status_summary_ja": "イースター休暇の期ずれによる需要の分散はあったが、継続する人気により過去最高を記録。", "positive_drivers_ja": [ "継続する訪日旅行人気" ], "constraints_ja": [], "demand_events_ja": [ "イースター休暇の期ずれ" ], "aviation_updates_ja": [] }, "dashboard_tags": [ "moderate_growth", "record_high" ] }
                ]
            }
        ];

        const Icons = {
            TrendingUp: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>,
            TrendingDown: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 17h8m0 0v-8m0 8l-8-8-4 4-6-6"></path></svg>,
            Calendar: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>,
            Plane: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
            Trophy: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>,
            BarChart: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>,
            Map: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
        };

        const surveyIcons = {
            arrowLeft: <path d="M19 12H5M12 19l-7-7 7-7"/>,
            users: <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 10a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>,
            star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>,
            globe: <React.Fragment><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></React.Fragment>,
            mapPin: <React.Fragment><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></React.Fragment>,
            flag: <React.Fragment><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></React.Fragment>,
            train: <React.Fragment><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/><path d="M2 8h20"/></React.Fragment>,
            wallet: <React.Fragment><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"/></React.Fragment>,
            messageSquare: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>,
            thumbsUp: <React.Fragment><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></React.Fragment>,
            heart: <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>,
            alertCircle: <React.Fragment><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></React.Fragment>,
        };

        const SurveyIcon = ({ path, size = 18, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {path}
            </svg>
        );

        const tagStyles = {
            "strong_growth": { label: "大幅増", style: "bg-teal-100 text-teal-800 border-teal-200" },
            "moderate_growth": { label: "堅調増", style: "bg-slate-100 text-slate-700 border-slate-200" },
            "decline": { label: "減少", style: "bg-slate-200 text-slate-600 border-slate-300" },
            "severe_decline": { label: "大幅減", style: "bg-slate-300 text-slate-700 border-slate-400" },
            "continued_japan_popularity": { label: "人気継続", style: "bg-teal-50 text-teal-700 border-teal-100" },
            "new_route": { label: "新規就航", style: "bg-slate-100 text-slate-800 border-slate-200" },
            "aviation_increase": { label: "増便", style: "bg-slate-100 text-slate-800 border-slate-200" },
            "route_resumption": { label: "復便", style: "bg-slate-100 text-slate-800 border-slate-200" },
            "seat_capacity_decline": { label: "座席減", style: "bg-slate-200 text-slate-700 border-slate-300" },
            "holiday_effect": { label: "イベント効果", style: "bg-teal-50 text-teal-700 border-teal-100" },
            "easter_shift": { label: "期ずれ", style: "bg-slate-100 text-slate-600 border-slate-200" },
            "geopolitical_risk": { label: "地政学リスク", style: "bg-slate-200 text-slate-700 border-slate-300" },
            "regulatory_constraint": { label: "規制影響", style: "bg-slate-300 text-slate-800 border-slate-400" },
            "record_high": { label: "過去最高", style: "bg-teal-100 text-teal-800 border-teal-300" },
            "april_record_high": { label: "4月過去最高", style: "bg-teal-100 text-teal-800 border-teal-300" },
            "all_time_record_high": { label: "単月過去最高", style: "bg-teal-500 text-white border-teal-600 font-bold" }
        };

        const formatNumber = (num) => num ? num.toLocaleString() : "0";

        const ChangeText = ({ change, reverseColor = false }) => {
            if (change === null || change === undefined) return <span>-</span>;
            const isPositive = change > 0;
            const isNegative = change < 0;
            let colorClass = "text-slate-500";
            if (isPositive) colorClass = reverseColor ? "text-slate-500" : "text-teal-600";
            if (isNegative) colorClass = reverseColor ? "text-teal-600" : "text-slate-500";

            return (
                <span className={`font-bold flex items-center ${colorClass}`}>
                    {isPositive ? "▲" : (isNegative ? "▼" : "")} {Math.abs(change).toFixed(1)}%
                </span>
            );
        };

        // --- JNTOツールチップロジック ---
        const getOrCreateTooltip = (chart) => {
            let tooltipEl = chart.canvas.parentNode.querySelector('div');
            if (!tooltipEl) {
                tooltipEl = document.createElement('div');
                tooltipEl.style.background = 'rgba(255, 255, 255, 0.98)';
                tooltipEl.style.borderRadius = '8px';
                tooltipEl.style.color = '#2D3748';
                tooltipEl.style.opacity = 1;
                tooltipEl.style.pointerEvents = 'none';
                tooltipEl.style.position = 'absolute';
                tooltipEl.style.transform = 'translate(-50%, 0)';
                tooltipEl.style.transition = 'all .1s ease';
                tooltipEl.style.boxShadow = '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)';
                tooltipEl.style.border = '1px solid #E2E8F0';
                tooltipEl.style.zIndex = 100;
                tooltipEl.style.minWidth = '220px';

                const table = document.createElement('table');
                table.style.margin = '0px';
                table.style.width = '100%';

                tooltipEl.appendChild(table);
                chart.canvas.parentNode.appendChild(tooltipEl);
            }
            return tooltipEl;
        };

        const externalTooltipHandler = (context, marketKey, rawDataList) => {
            const {chart, tooltip} = context;
            const tooltipEl = getOrCreateTooltip(chart);

            if (tooltip.opacity === 0) {
                tooltipEl.style.opacity = 0;
                return;
            }

            if (tooltip.body) {
                const titleLines = tooltip.title || [];
                const bodyLines = tooltip.body.map(b => b.lines);
                
                const label = titleLines[0];
                const monthData = rawDataList.find(d => `${d.report.data_year}年${d.report.data_month_number}月` === label);
                const marketData = monthData ? monthData.markets.find(m => m.market_key === marketKey) : null;
                const ctxData = marketData ? marketData.market_context : {};

                const tableRoot = tooltipEl.querySelector('table');
                while (tableRoot.firstChild) {
                    tableRoot.firstChild.remove();
                }

                const thead = document.createElement('thead');
                titleLines.forEach(title => {
                    const tr = document.createElement('tr');
                    tr.style.borderWidth = 0;
                    const th = document.createElement('th');
                    th.style.borderWidth = 0;
                    th.style.textAlign = 'left';
                    th.style.padding = '8px 12px';
                    th.style.borderBottom = '1px solid #E2E8F0';
                    th.style.fontSize = '14px';
                    th.style.color = '#4A5568';
                    const text = document.createTextNode(title);
                    th.appendChild(text);
                    tr.appendChild(th);
                    thead.appendChild(tr);
                });

                const tbody = document.createElement('tbody');
                
                bodyLines.forEach((body, i) => {
                    const colors = tooltip.labelColors[i];
                    const tr = document.createElement('tr');
                    tr.style.backgroundColor = 'inherit';
                    tr.style.borderWidth = 0;

                    const td = document.createElement('td');
                    td.style.borderWidth = 0;
                    td.style.padding = '8px 12px';
                    
                    const colorSquare = document.createElement('span');
                    colorSquare.style.background = colors.backgroundColor;
                    colorSquare.style.borderColor = colors.borderColor;
                    colorSquare.style.borderWidth = '2px';
                    colorSquare.style.marginRight = '8px';
                    colorSquare.style.height = '12px';
                    colorSquare.style.width = '12px';
                    colorSquare.style.display = 'inline-block';
                    colorSquare.style.borderRadius = '2px';

                    const rawVal = body[0].split(': ')[1] || body[0];
                    const textNode = document.createTextNode(`人数: ${rawVal}`);

                    td.appendChild(colorSquare);
                    td.appendChild(textNode);
                    td.style.fontWeight = 'bold';
                    td.style.fontSize = '14px';
                    
                    tr.appendChild(td);
                    tbody.appendChild(tr);
                });

                if (ctxData) {
                    const addContextItem = (items, labelStr, colorCode) => {
                        if (items && items.length > 0) {
                            const tr = document.createElement('tr');
                            const td = document.createElement('td');
                            td.style.padding = '4px 12px 8px 12px';
                            td.style.fontSize = '12px';
                            
                            const labelNode = document.createElement('div');
                            labelNode.style.display = 'flex';
                            labelNode.style.alignItems = 'center';
                            labelNode.style.color = '#4A5568';
                            labelNode.style.fontWeight = 'bold';
                            labelNode.style.marginBottom = '4px';

                            const colorSquare = document.createElement('span');
                            colorSquare.style.background = colorCode;
                            colorSquare.style.marginRight = '6px';
                            colorSquare.style.height = '10px';
                            colorSquare.style.width = '10px';
                            colorSquare.style.display = 'inline-block';
                            colorSquare.style.borderRadius = '2px';

                            labelNode.appendChild(colorSquare);
                            labelNode.appendChild(document.createTextNode(labelStr));
                            
                            const ul = document.createElement('ul');
                            ul.style.margin = '0';
                            ul.style.paddingLeft = '16px';
                            ul.style.color = '#718096';
                            ul.style.listStyleType = 'disc';
                            
                            items.forEach(item => {
                                const li = document.createElement('li');
                                li.appendChild(document.createTextNode(item));
                                li.style.marginBottom = '2px';
                                ul.appendChild(li);
                            });

                            td.appendChild(labelNode);

        const URL_VISITORS = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent('兼六園金沢城公園')}`;

        const fetchCSV = (url) => {
            return new Promise((resolve, reject) => {

                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => resolve(results.data),
                    error: (err) => reject(err)
                });
            });

        const getFiscalYear = (dateStr) => {
            const d = new Date(dateStr);
            const year = d.getFullYear();
            const month = d.getMonth() + 1;
            return month >= 4 ? year : year - 1;
        };

        const processParkData = (rawVisitors, rawForeign) => {
            const foreignAgg = {};
            rawForeign.forEach(row => {
                const m = row['年月'];
                const count = parseInt((row['人数'] || '0').replace(/,/g, ''), 10);
                if (!m) return;
                if (!foreignAgg[m]) foreignAgg[m] = { total: 0, countries: [] };
                foreignAgg[m].total += count;
                if (count > 0) foreignAgg[m].countries.push({ country: row['国と地域'], count: count });
            });

            const monthlyData = rawVisitors.map(row => {
                const m = row['年月'];
                const kenrokuen = parseInt((row['兼六園入園者数'] || '0').replace(/,/g, ''), 10) || 0;
                const kanazawa = parseInt((row['金沢城公園入園者数'] || '0').replace(/,/g, ''), 10) || 0;
                
                let inboundCount = 0;
                let foreignDetails = [];
                if (foreignAgg[m]) {
                    inboundCount = foreignAgg[m].total;
                    foreignDetails = foreignAgg[m].countries.sort((a, b) => b.count - a.count);
                }
                const inboundIndex = kenrokuen > 0 ? (inboundCount / kenrokuen) * 100 : 0;

                return { month: m, date: new Date(m), kenrokuen, kanazawa, inboundCount, inboundIndex, foreignDetails };
            }).filter(d => !isNaN(d.date.getTime())).sort((a, b) => a.date - b.date);

            const yearlyAgg = {};
            monthlyData.forEach(row => {
                const fy = getFiscalYear(row.month);
                if (!yearlyAgg[fy]) yearlyAgg[fy] = { kenrokuen: 0, kanazawa: 0, inbound: 0 };
                yearlyAgg[fy].kenrokuen += row.kenrokuen;
                yearlyAgg[fy].kanazawa += row.kanazawa;
                yearlyAgg[fy].inbound += row.inboundCount;
            });

            return { monthlyData, yearlyAgg };

        const ParkInboundSection = ({ monthlyData }) => {

            const chartRef = React.useRef(null);
            const chartInstance = React.useRef(null);

            return (

        const ParkYearlyTable = ({ yearlyAgg, isKenrokuen, targetKey }) => {

                    <h2 className="text-sm font-bold text-slate-700 mb-4 flex items-center gap-2"><i className="fa-solid fa-table"></i> 年度別 データ表</h2>
                    <div className="overflow-x-auto custom-scrollbar max-h-[350px]">
                        <table className="min-w-full text-sm text-left">

                                <tr>
                                    <th className="py-3 px-4 rounded-tl-lg whitespace-nowrap">年度</th>
                                    <th className="py-3 px-4 text-right whitespace-nowrap">入園者数(人)</th>
                                    <th className="py-3 px-4 text-right whitespace-nowrap">前年度比</th>

                                        const prevCount = yearlyAgg[fyLabels[i+1]][targetKey];

        const ParkDashboard = ({ parkType, parkData }) => {

            return (

                            <div className={`text-4xl font-black ${themeColorClass} mb-2`}>{formatNumber(latestData[targetKey])} <span className="text-lg font-normal text-slate-500">人</span></div>

        // ==========================================
        // --- Survey(アンケート) データとロジック ---
        // ==========================================
        const parseSurveyCSV = (text) => {
            const rows = [];
            let currentRow = [];
            let currentField = '';
            let inQuote = false;
            
            const normalizedText = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

            for (let i = 0; i < normalizedText.length; i++) {
                const char = normalizedText[i];
                const nextChar = normalizedText[i + 1];

                if (inQuote) {
                    if (char === '"') {
                        if (nextChar === '"') { currentField += '"'; i++; } 
                        else { inQuote = false; }
                    } else { currentField += char; }
                } else {
                    if (char === '"') { inQuote = true; } 
                    else if (char === ',') { currentRow.push(currentField); currentField = ''; } 
                    else if (char === '\n') {
                        currentRow.push(currentField);
                        if (currentRow.length > 1 || (currentRow.length === 1 && currentRow[0] !== '')) rows.push(currentRow);
                        currentRow = []; currentField = '';
                    } else { currentField += char; }
                }
            }
            if (currentField || currentRow.length > 0) { currentRow.push(currentField); rows.push(currentRow); }

            if (rows.length < 2) return [];

            return rows.slice(1).map(vals => {
                if (vals.length < 5) return null;
                return {
                    timestamp: vals[0], facility: vals[1], satisfaction: vals[3], satReason: vals[4],
                    hasInconv: vals[5] === 'Yes', inconvDetail: vals[6], recScore: parseInt(vals[7] || '0', 10), recReason: vals[8],
                    japanStatus: vals[9], gender: vals[10], age: vals[11], country: vals[12], visitCountJapan: vals[13],
                    companion: vals[17], purpose: vals[18], stayDays: vals[19], infoSource: vals[20], travelStyle: vals[21],
                    transportJapan: vals[23], expenditure: parseInt((vals[26] || '0').replace(/[^0-9]/g, ''), 10),
                    ishikawaStatus: vals[27], visitCountIshikawa: vals[28], stayNightsIshikawa: vals[29], accommodation: vals[31],
                    destinations: vals[32], experiences: vals[33], events: vals[34], transportIshikawa: vals[35]
                };
            }).filter(item => item !== null && !isNaN(item.recScore));
        };

        const SurveyCard = ({ children, className = "" }) => (
            <div className={`tifo-card border-slate-200 shadow-sm ${className}`}>
                {children}
            </div>
        );

        const SurveySectionHeader = ({ title, iconPath }) => (
            <div className="flex items-center gap-3 mb-6 mt-10">

        const SurveyProgressBar = ({ label, value, max, percentage, rankIndex }) => (

                <div className="flex items-center text-sm mb-2">
                    {rankIndex !== undefined && (
                        <div className={`rank-badge text-xs shadow-sm mr-3 ${rankIndex === 0 ? 'bg-teal-400 text-white' : rankIndex === 1 ? 'bg-slate-300 text-slate-700' : rankIndex === 2 ? 'bg-slate-400 text-white' : 'bg-slate-200 text-slate-500'}`}>
                            {rankIndex + 1}
                        </div>
                    )}
                    <span className="font-bold text-slate-700 truncate pr-2 flex-grow">{label}</span>
                    <div className="flex items-center gap-2 shrink-0">
                        <span className="font-black text-slate-800">{value}</span>
                        <span className="text-xs text-slate-400 w-10 text-right font-bold">{percentage}%</span>
                    </div>
                </div>
                <div className="progress-bar-bg w-full">

        );

        const SurveyRankingCard = ({ title, data }) => {
            const total = data.reduce((acc, curr) => acc + curr.value, 0);
            const sortedData = [...data].sort((a, b) => b.value - a.value);

            return (
                <div className="flex flex-col h-full mb-4">
                    <h4 className="text-sm font-black text-slate-400 mb-4 uppercase tracking-widest">{title}</h4>

                        {sortedData.map((item, idx) => (
                            <SurveyProgressBar key={idx} label={item.name} value={item.value} max={total} percentage={total > 0 ? Math.round((item.value / total) * 100) : 0} rankIndex={idx} />
                        ))}
                        {data.length === 0 && (
                            <div className="py-6 text-center text-slate-400 font-bold bg-slate-50 rounded-xl">
                                データなし
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const SurveyNPSMeter = ({ nps }) => {
            const percentage = Math.min(Math.max(((nps + 100) / 200) * 100, 0), 100);
            let labelColor = "text-[var(--tifo-primary-dark)]";
            if (nps < 0) labelColor = "text-[var(--tifo-secondary)]";

            return (
                <SurveyCard className="h-full flex flex-col items-center justify-center py-8">
                    <h4 className="text-sm font-black text-slate-400 uppercase tracking-widest mb-4">推奨意向 (NPS)</h4>
                    <div className={`text-6xl font-black mb-2 ${labelColor} tracking-tighter drop-shadow-sm`}>

                    <div className="w-full max-w-[90%]">

                            <span>-100</span><span>0</span><span>+100</span>
                        </div>
                    </div>
                </SurveyCard>
            );
        };

        const SurveyHistogram = ({ data }) => {
            const values = data.map(d => d.expenditure).filter(v => !isNaN(v)).sort((a, b) => a - b);
            const mid = Math.floor(values.length / 2);
            const median = values.length > 0 ? (values.length % 2 !== 0 ? values[mid] : (values[mid - 1] + values[mid]) / 2) : 0;

            const bins = [
                { name: '<5万', max: 50000, count: 0 },
                { name: '5-10万', max: 100000, count: 0 },
                { name: '10-20万', max: 200000, count: 0 },
                { name: '20-30万', max: 300000, count: 0 },
                { name: '30万+', max: Infinity, count: 0 },
            ];

            values.forEach(v => {
                const bin = bins.find(b => v < b.max);
                if (bin) bin.count++;
            });

            const maxCount = Math.max(...bins.map(b => b.count), 1);

            return (
                <SurveyCard className="h-full flex flex-col">
                    <div className="flex justify-between items-start mb-6">
                        <h4 className="font-black text-slate-700">旅行総支出額 <span className="text-xs text-slate-400 font-bold ml-1">(1人あたり)</span></h4>

        const SurveyDashboard = ({ data, isLoading, error }) => {
            const [selectedCountry, setSelectedCountry] = React.useState(null);

            const countryStats = React.useMemo(() => {
                const stats = {};
                data.forEach(d => { if (d.country) stats[d.country] = (stats[d.country] || 0) + 1; });
                return Object.entries(stats).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count);
            }, [data]);

            const filteredData = React.useMemo(() => {
                if (!selectedCountry) return [];
                return data.filter(d => d.country === selectedCountry);
            }, [data, selectedCountry]);

            const analysis = React.useMemo(() => {
                if (filteredData.length === 0) return null;
                const aggregate = (field, isMulti = false) => {
                    const counts = {};
                    filteredData.forEach(d => {
                        const rawVal = d[field];
                        if (!rawVal) return;
                        if (isMulti) {
                            rawVal.split(',').forEach(v => { const val = v.trim(); if (val) counts[val] = (counts[val] || 0) + 1; });
                        } else counts[rawVal] = (counts[rawVal] || 0) + 1;
                    });
                    return Object.entries(counts).map(([name, value]) => ({ name, value }));
                };

                const satMap = { 'Very satisfied': 5, 'Satisfied': 4, 'Somewhat satisfied': 3, 'Somewhat dissatisfied': 2, 'Dissatisfied': 1 };
                const avgSat = (filteredData.reduce((acc, curr) => acc + (satMap[curr.satisfaction] || 0), 0) / filteredData.length).toFixed(1);
                const promoters = filteredData.filter(d => d.recScore >= 9).length;
                const detractors = filteredData.filter(d => d.recScore <= 6).length;
                const nps = Math.round(((promoters - detractors) / filteredData.length) * 100);

                return {
                    nps, avgSat, facility: aggregate('facility'), age: aggregate('age'), gender: aggregate('gender'), companion: aggregate('companion'),
                    japanStatus: aggregate('japanStatus'), visitCountJapan: aggregate('visitCountJapan'), stayDays: aggregate('stayDays'), purpose: aggregate('purpose'), travelStyle: aggregate('travelStyle'),
                    ishikawaStatus: aggregate('ishikawaStatus'), visitCountIshikawa: aggregate('visitCountIshikawa'), stayNightsIshikawa: aggregate('stayNightsIshikawa'), accommodation: aggregate('accommodation'),
                    destinations: aggregate('destinations', true), experiences: aggregate('experiences', true), events: aggregate('events'), transportJapan: aggregate('transportJapan', true), transportIshikawa: aggregate('transportIshikawa', true),
                    infoSource: aggregate('infoSource', true), comments: filteredData.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))

        // ==========================================
        // --- App コンポーネント (統合) ---
        // ==========================================
        const App = () => {
            // JNTO状態
            const [jntoDataList, setJntoDataList] = React.useState([]);
            const [isJntoLoading, setIsJntoLoading] = React.useState(true);
            const [isFallback, setIsFallback] = React.useState(false);
            const [selectedMonth, setSelectedMonth] = React.useState('');
            const [selectedMarket, setSelectedMarket] = React.useState('');
            
            // Park状態
            const [parkData, setParkData] = React.useState(null);
            const [isParkLoading, setIsParkLoading] = React.useState(true);
            const [parkError, setParkError] = React.useState(null);

            // Survey状態
            const [surveyData, setSurveyData] = React.useState([]);
            const [isSurveyLoading, setIsSurveyLoading] = React.useState(true);
            const [surveyError, setSurveyError] = React.useState(null);

            const [activeTab, setActiveTab] = React.useState('overview');

            React.useEffect(() => {
                // JNTO
                const fetchJNTO = async () => {
                    const fetchedData = [];
                    const startYear = 2024, startMonth = 4;
                    const today = new Date();
                    const endYear = today.getFullYear();
                    let endMonth = today.getMonth() + 2; 
                    let actualEndYear = endYear;
                    if (endMonth > 12) { endMonth -= 12; actualEndYear++; }

                    const fetchPromises = [];
                    for (let y = startYear; y <= actualEndYear; y++) {
                        let mStart = (y === startYear) ? startMonth : 1;
                        let mEnd = (y === actualEndYear) ? endMonth : 12;
                        for (let m = mStart; m <= mEnd; m++) {
                            const url = `./data/jnto_${y}${m.toString().padStart(2, '0')}.json`;
                            fetchPromises.push(fetch(url).then(res => res.ok ? res.json() : null).catch(() => null));
                        }
                    }

                    try {
                        const results = await Promise.all(fetchPromises);
                        results.forEach(res => { if (res && res.schema_version && res.report) fetchedData.push(res); });
                        if (fetchedData.length > 0) setJntoDataList(fetchedData);
                        else { setJntoDataList(fallbackData); setIsFallback(true); }
                    } catch (err) {
                        setJntoDataList(fallbackData); setIsFallback(true);
                    } finally {
                        setIsJntoLoading(false);
                    }
                };

                // Park
                const fetchPark = async () => {
                    try {
                        const [rawVisitors, rawForeign] = await Promise.all([
                            fetchCSV(URL_VISITORS), fetchCSV(URL_FOREIGN)
                        ]);
                        if(rawVisitors.length > 0){
                            setParkData(processParkData(rawVisitors, rawForeign));
                        } else {
                            setParkError('スプレッドシートからデータが取得できませんでした。');
                        }
                    } catch (e) {
                        setParkError('データ取得エラーが発生しました。');
                    } finally {
                        setIsParkLoading(false);
                    }
                };

                // Survey
                const fetchSurvey = async () => {
                    try {
                        const response = await fetch('https://raw.githubusercontent.com/codefornoto/MilliforInbound/main/milliforinbound.csv');
                        if (!response.ok) throw new Error(`Data fetch failed`);
                        const buffer = await response.arrayBuffer();
                        const decoder = new TextDecoder('utf-8');
                        let csvText = decoder.decode(buffer);
                        if (csvText.charCodeAt(0) === 0xFEFF) csvText = csvText.slice(1);
                        const parsedData = parseSurveyCSV(csvText);
                        setSurveyData(parsedData);
                    } catch (err) {
                        setSurveyError("アンケートデータの読み込みに失敗しました。");
                    } finally {
                        setIsSurveyLoading(false);
                    }
                };

                fetchJNTO();
                fetchPark();
                fetchSurvey();
            }, []);

            // JNTO ロジック
            const sortedJntoList = React.useMemo(() => [...jntoDataList].sort((a, b) => (b.report.data_year * 100 + b.report.data_month_number) - (a.report.data_year * 100 + a.report.data_month_number)), [jntoDataList]);
            React.useEffect(() => {
                if (sortedJntoList.length > 0 && !selectedMonth) setSelectedMonth(`${sortedJntoList[0].report.data_year}-${sortedJntoList[0].report.data_month_number}`);
            }, [sortedJntoList, selectedMonth]);

            const currentJnto = React.useMemo(() => jntoDataList.find(d => `${d.report.data_year}-${d.report.data_month_number}` === selectedMonth) || sortedJntoList[0], [jntoDataList, sortedJntoList, selectedMonth]);
            const sortedMarkets = React.useMemo(() => currentJnto ? [...currentJnto.markets].sort((a, b) => b.visitor_arrivals.month.current_value - a.visitor_arrivals.month.current_value) : [], [currentJnto]);

            React.useEffect(() => {

            const handleGoToAnalysis = (marketKey) => {

                            {isJntoTab && !isJntoLoading && (
                                <div className="flex items-center gap-3 bg-white px-4 py-2 rounded-lg border border-slate-200 shadow-sm animate-fade-in">
                                    <span className="text-sm font-bold text-slate-600">表示対象月:</span>
                                    <select 
                                        value={selectedMonth}
                                        onChange={(e) => setSelectedMonth(e.target.value)}
                                        className="border border-slate-200 rounded font-bold text-teal-700 bg-slate-50 p-1 cursor-pointer outline-none hover:bg-slate-100 transition-colors"
                                    >
                                        {sortedJntoList.map(d => (
                                            <option key={`${d.report.data_year}-${d.report.data_month_number}`} value={`${d.report.data_year}-${d.report.data_month_number}`}>
                                                {d.report.data_year}年{d.report.data_month_number}月
                                            </option>
                                        ))}
                                    </select>
                                </div>
                            )}
                        </div>
                    </header>
                    
                    <div className="flex border-b border-slate-200 mb-6 flex-shrink-0 overflow-x-auto custom-scrollbar">
                        <button className={`feedback-tab-button ${activeTab === 'overview' ? 'active' : ''}`} onClick={() => setActiveTab('overview')}>
                            <Icons.BarChart /> 訪日外客数 サマリー
                        </button>
                        <button className={`feedback-tab-button ${activeTab === 'analysis' ? 'active' : ''}`} onClick={() => setActiveTab('analysis')}>
                            <Icons.Map /> 国・地域別の要因分析
                        </button>
                        <button className={`feedback-tab-button ${activeTab === 'kenrokuen' ? 'active' : ''}`} onClick={() => setActiveTab('kenrokuen')}>
                            <i className="fa-solid fa-tree"></i> 兼六園
                        </button>
                        <button className={`feedback-tab-button ${activeTab === 'kanazawa' ? 'active' : ''}`} onClick={() => setActiveTab('kanazawa')}>
                            <i className="fa-solid fa-chess-rook"></i> 金沢城公園
                        </button>
                        <button className={`feedback-tab-button ${activeTab === 'survey' ? 'active' : ''}`} onClick={() => setActiveTab('survey')}>
                            <i className="fa-solid fa-clipboard-list"></i> アンケート
                        </button>
                    </div>

                    <div className="flex-1">
                        {/* JNTOコンテンツ */}
                        {isJntoTab && (
                            isJntoLoading ? (
                                <div className="py-20 flex flex-col items-center justify-center">
                                    <div className="w-12 h-12 border-4 border-teal-200 border-t-teal-500 rounded-full animate-spin mb-4"></div>
                                    <div className="text-teal-700 font-bold animate-pulse">データを読み込んでいます...</div>
                                </div>
                            ) : currentJnto ? (
                                <>
                                    {activeTab === 'overview' && <OverviewTab data={currentJnto} markets={sortedMarkets} onSelectMarket={handleGoToAnalysis} />}
                                    {activeTab === 'analysis' && <MarketAnalysisTab markets={sortedMarkets} selectedMarket={selectedMarket} onSelectMarket={setSelectedMarket} rawDataList={jntoDataList} />}
                                </>
                            ) : <div>データがありません</div>
                        )}

                        {/* Parkコンテンツ */}
                        {(activeTab === 'kenrokuen' || activeTab === 'kanazawa') && (
                            isParkLoading ? (
                                <div className="py-20 flex flex-col items-center justify-center">
                                    <div className="w-12 h-12 border-4 border-teal-200 border-t-teal-500 rounded-full animate-spin mb-4"></div>
                                    <div className="text-teal-700 font-bold animate-pulse">スプレッドシートからデータを取得中...</div>
                                </div>
                            ) : parkError ? (
                                <div className="py-20 text-center text-red-500 font-bold"><i className="fa-solid fa-circle-exclamation mr-2"></i>{parkError}</div>
                            ) : (
                                <ParkDashboard parkType={activeTab} parkData={parkData} />
                            )
                        )}

                        {/* Surveyコンテンツ */}
                        {activeTab === 'survey' && (
                            <SurveyDashboard data={surveyData} isLoading={isSurveyLoading} error={surveyError} />
                        )}
                    </div>

                    <div className="mt-12 pt-6 border-t border-slate-200 text-right flex flex-col items-end gap-2">
                        <p className="text-sm text-slate-500 font-medium">
                            出典: {isJntoTab ? (currentJnto?.report?.source_name_ja || '日本政府観光局（JNTO）') : 'Milli'}
                        </p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
